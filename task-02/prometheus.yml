scrape_configs:
- job_name: cadvisor
  scrape_interval: 5s
  static_configs:
  - targets:
    - cadvisor:8080
  relabel_configs:
  - target_label: node
    replacement: docker-host
  metric_relabel_configs:
  - source_labels: [name]
    regex: '[0-9a-f]{64}'
    action: drop
  - source_labels: [id, container_label_com_docker_compose_project]
    regex: ';.*|.*;task-02'
    action: keep
  - source_labels: [name]
    target_label: container
  - source_labels: [container_label_com_docker_compose_service]
    target_label: service